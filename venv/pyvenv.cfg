# Personal Finance Tracker

A full-stack finance tracking app with AI insights.

## Tech Stack
- Frontend: React.js
- Backend: Node.js + Express
- Database: MongoDB
- AI Module: Python Flask + Pandas

## How to Run

### Backend
cd backend
node server.js

### Frontend
cd client
npm start

### AI Module
cd ai
python app.py

## Features
- JWT Authentication
- Add/Delete Transactions
- Income & Expense Tracking
- Charts & Graphs
- AI Financial Insights